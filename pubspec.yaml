name: payparse
description: "PayParse – SMS to Invoice Generator"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Permissions
  permission_handler: ^11.3.0

  # PDF & Printing
  pdf: ^3.11.0
  printing: ^5.13.0
  path_provider: ^2.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image Picker (for logo upload)
  image_picker: ^1.0.7

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 24
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
